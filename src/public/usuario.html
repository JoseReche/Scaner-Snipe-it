<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuário</title>
    <link rel="stylesheet" href="/auth.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h3>Usuário</h3>
        <div class="menu-wrapper">
          <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Abrir menu">☰</button>
          <nav id="menu-panel" class="menu-panel" aria-label="Navegação principal">
            <a href="/scanner.html">Scanner</a>
            <a href="/usuario.html">Usuário</a>
            <a href="/dashboard.html">Dashboard</a>
            <a href="#" id="logout-link">Sair</a>
          </nav>
        </div>
      </div>

      <div class="grid single-column">
        <section class="card">
          <h1>Criar usuário</h1>
          <p class="small">Cadastre uma matrícula e senha forte para acessar o sistema.</p>

          <form id="register-form">
            <label for="matricula">Matrícula</label>
            <input id="matricula" name="matricula" required minlength="3" maxlength="30" />

            <label for="password">Senha</label>
            <input id="password" name="password" type="password" required minlength="12" />

            <p class="small">A senha deve conter letra maiúscula, minúscula, número e símbolo.</p>

            <label for="apiKey">Chave pessoal da API</label>
            <input id="apiKey" name="apiKey" type="password" required minlength="10" autocomplete="off" />

            <div class="actions">
              <button type="submit">Criar usuário</button>
            </div>
          </form>

          <p id="message" class="message" aria-live="polite"></p>
        </section>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
      setupRegisterForm('register-form', 'message')

      const menuToggle = document.getElementById('menu-toggle')
      const menuPanel = document.getElementById('menu-panel')

      menuToggle.addEventListener('click', () => {
        menuPanel.classList.toggle('open')
      })

      document.addEventListener('click', (event) => {
        if (!menuPanel.contains(event.target) && !menuToggle.contains(event.target)) {
          menuPanel.classList.remove('open')
        }
      })

      document.getElementById('logout-link').addEventListener('click', (event) => {
        event.preventDefault()
        clearJwtToken()
        window.location.href = '/login.html'
      })
    </script>
  </body>
</html>
