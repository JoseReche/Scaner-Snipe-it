<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/auth.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h3>Dashboard</h3>
        <div class="menu-wrapper">
          <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Abrir menu">☰</button>
          <nav id="menu-panel" class="menu-panel" aria-label="Navegação principal">
            <a href="/scanner.html">Scanner</a>
            <a href="/usuario.html">Usuário</a>
            <a href="/dashboard.html">Dashboard</a>
            <a href="#" id="logout-link">Sair</a>
          </nav>
        </div>
      </div>

      <div class="grid single-column">
        <section class="card">
          <h2>Consulta de ativo</h2>
          <label for="asset-id">ID do ativo</label>
          <input id="asset-id" type="number" value="1" min="1" />

          <button id="load-asset">Consultar</button>

          <p id="message" class="message" aria-live="polite"></p>
          <pre id="output">Nenhuma consulta executada.</pre>
        </section>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
      requireAuthToken()

      const message = document.getElementById('message')
      const output = document.getElementById('output')
      const menuToggle = document.getElementById('menu-toggle')
      const menuPanel = document.getElementById('menu-panel')

      menuToggle.addEventListener('click', () => {
        menuPanel.classList.toggle('open')
      })

      document.addEventListener('click', (event) => {
        if (!menuPanel.contains(event.target) && !menuToggle.contains(event.target)) {
          menuPanel.classList.remove('open')
        }
      })

      document.getElementById('logout-link').addEventListener('click', (event) => {
        event.preventDefault()
        clearJwtToken()
        window.location.href = '/login.html'
      })

      document.getElementById('load-asset').addEventListener('click', async () => {
        const id = document.getElementById('asset-id').value

        message.textContent = ''
        message.className = 'message'

        try {
          const response = await fetch(`/api/sipe/hardware/${id}`, {
            headers: {
              Authorization: `Bearer ${getJwtToken()}`
            }
          })
          const data = await response.json()

          if (!response.ok) {
            message.textContent = data.error || 'Falha ao consultar ativo'
            message.classList.add('error')
            output.textContent = JSON.stringify(data, null, 2)
            return
          }

          message.textContent = 'Consulta realizada com sucesso'
          message.classList.add('success')
          output.textContent = JSON.stringify(data, null, 2)
        } catch (error) {
          message.textContent = error.message
          message.classList.add('error')
          output.textContent = error.message
        }
      })
    </script>
  </body>
</html>
