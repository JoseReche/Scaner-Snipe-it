<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cadastro de Ativo</title>
<link rel="stylesheet" href="/auth.css" />
</head>
<body>
<div class="container">
  <div class="topbar">
    <h3>Cadastro de Ativo</h3>
    <div class="menu-wrapper">
      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Abrir menu">☰</button>
      <nav id="menu-panel" class="menu-panel" aria-label="Navegação principal">
        <a href="/scanner">Scanner</a>
        <a href="/cadastro-ativo">Cadastro de Ativo</a>
        <a href="/home-office">Baixa Home Office</a>
        <a href="/usuario">Usuário</a>
        <a href="/dashboard">Dashboard</a>
        <a href="#" onclick="logout(event)">Sair</a>
      </nav>
    </div>
  </div>

  <div class="grid single-column">
    <section class="card">
      <h3>Novo ativo</h3>
      <p class="small">Preencha os campos obrigatórios para cadastrar um novo ativo no Snipe-IT.</p>

      <label>Nome</label>
      <input id="name" placeholder="Ex.: Notebook Dell 5420">

      <label>Tag do ativo</label>
      <input id="assetTag" placeholder="Ex.: NTB-1020">

      <label>Serial</label>
      <input id="serial" placeholder="Ex.: ABC123XYZ">

      <label>Modelo *</label>
      <select id="model"></select>

      <label>Status *</label>
      <select id="status"></select>

      <label>Local</label>
      <select id="location"></select>

      <label>Local padrão (RTD)</label>
      <select id="rtdLocation"></select>

      <label>Empresa</label>
      <select id="company"></select>

      <label>Notas</label>
      <textarea id="notes" placeholder="Observações adicionais"></textarea>

      <button id="saveButton" onclick="createAsset()">Cadastrar ativo</button>
      <p id="feedback" class="message" aria-live="polite"></p>
    </section>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
requireAuthToken()

const byId = (id) => document.getElementById(id)
const menuToggle = byId('menu-toggle')
const menuPanel = byId('menu-panel')

menuToggle.addEventListener('click', () => {
  menuPanel.classList.toggle('open')
})

document.addEventListener('click', (event) => {
  if (!menuPanel.contains(event.target) && !menuToggle.contains(event.target)) {
    menuPanel.classList.remove('open')
  }
})

const authHeaders = (extra = {}) => ({
  ...extra,
  Authorization: `Bearer ${getJwtToken()}`
})

function logout(event) {
  if (event) event.preventDefault()
  clearJwtToken()
  window.location.href = '/login'
}

function isAuthTokenError(data) {
  const message = (data?.error || '').toLowerCase()
  return message.includes('token inválido') || message.includes('token ausente') || message.includes('token expirado')
}

function fillSelect(selectId, options, placeholder) {
  const select = byId(selectId)
  select.innerHTML = ''

  const empty = document.createElement('option')
  empty.value = ''
  empty.textContent = placeholder
  select.appendChild(empty)

  options.forEach((opt) => {
    const element = document.createElement('option')
    element.value = opt.id
    element.textContent = `${opt.id} - ${opt.name}`
    select.appendChild(element)
  })
}

function setFeedback(message, type = '') {
  const feedback = byId('feedback')
  feedback.textContent = message
  feedback.className = `message ${type}`.trim()
}

async function loadOptions() {
  const response = await fetch('/options', { headers: authHeaders() })
  const data = await response.json()

  if (response.status === 401 && isAuthTokenError(data)) {
    logout()
    return
  }

  if (!response.ok) {
    setFeedback(data.error || 'Falha ao carregar opções', 'error')
    return
  }

  fillSelect('model', data.models || [], 'Selecione')
  fillSelect('status', data.statuses || [], 'Selecione')
  fillSelect('location', data.locations || [], 'Selecione')
  fillSelect('rtdLocation', data.locations || [], 'Selecione')
  fillSelect('company', data.companies || [], 'Selecione')
}

async function createAsset() {
  const payload = {
    name: byId('name').value,
    asset_tag: byId('assetTag').value,
    serial: byId('serial').value,
    model_id: byId('model').value,
    status_id: byId('status').value,
    location_id: byId('location').value,
    rtd_location_id: byId('rtdLocation').value,
    company_id: byId('company').value,
    notes: byId('notes').value
  }

  const button = byId('saveButton')
  button.disabled = true
  button.textContent = 'Cadastrando...'
  setFeedback('')

  const response = await fetch('/asset', {
    method: 'POST',
    headers: authHeaders({ 'Content-Type': 'application/json' }),
    body: JSON.stringify(payload)
  })

  const data = await response.json()

  if (response.status === 401 && isAuthTokenError(data)) {
    logout()
    return
  }

  if (!response.ok) {
    setFeedback(data.error || 'Falha ao cadastrar ativo', 'error')
    button.disabled = false
    button.textContent = 'Cadastrar ativo'
    return
  }

  setFeedback('Ativo cadastrado com sucesso.', 'success')
  byId('name').value = ''
  byId('assetTag').value = ''
  byId('serial').value = ''
  byId('notes').value = ''
  byId('model').value = ''
  byId('status').value = ''
  byId('location').value = ''
  byId('rtdLocation').value = ''
  byId('company').value = ''

  button.disabled = false
  button.textContent = 'Cadastrar ativo'
}

loadOptions()
</script>
</body>
</html>
