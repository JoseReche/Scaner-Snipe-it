<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalhes do Ativo</title>
    <link rel="stylesheet" href="/auth.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h3>Detalhes do Ativo</h3>
        <a href="/scanner.html">Voltar ao scanner</a>
      </div>

      <div class="grid" style="grid-template-columns: minmax(0, 480px)">
        <section class="card">
          <h2>Ativo</h2>

          <div class="item" id="empresa"></div>
          <div class="item" id="marca"></div>
          <div class="item" id="status"></div>
          <div class="item" id="local"></div>
          <div class="item" id="pa"></div>

          <label for="novaPA">Nova PA</label>
          <input id="novaPA" placeholder="Nova PA" />

          <button onclick="mover()">Atualizar PA</button>
        </section>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
      requireAuthToken()

      const params = new URLSearchParams(location.search)
      const asset = params.get('id')

      const authHeaders = (extra = {}) => ({
        ...extra,
        Authorization: `Bearer ${getJwtToken()}`
      })

      const logout = () => {
        clearJwtToken()
        window.location.href = '/login.html'
      }

      const isAuthTokenError = (data) => {
        const message = (data?.error || '').toLowerCase()
        return message.includes('token inválido') || message.includes('token ausente') || message.includes('token expirado')
      }

      fetch('/asset/' + asset, { headers: authHeaders() })
        .then((r) => {
          if (r.status === 401) {
            return r.json().then((data) => {
              if (isAuthTokenError(data)) {
                logout()
                return null
              }

              return { ok: false, data }
            })
          }

          return r.json().then((data) => ({ ok: r.ok, data }))
        })
        .then((result) => {
          if (!result) {
            return
          }

          if (!result.ok) {
            alert(result.data.error || 'Falha ao carregar ativo')
            return
          }

          const data = result.data
          document.getElementById('empresa').innerHTML = '<b>Empresa:</b> ' + (data.company || '-')
          document.getElementById('marca').innerHTML = '<b>Marca:</b> ' + (data.manufacturer || '-')
          document.getElementById('status').innerHTML = '<b>Situação:</b> ' + (data.status || '-')
          document.getElementById('local').innerHTML = '<b>Local:</b> ' + (data.location || '-')
          document.getElementById('pa').innerHTML = '<b>PA:</b> ' + (data.pa || '-')
        })

      function mover() {
        const pa = document.getElementById('novaPA').value

        fetch('/move', {
          method: 'POST',
          headers: authHeaders({
            'Content-Type': 'application/json'
          }),
          body: JSON.stringify({
            asset,
            pa
          })
        })
          .then((r) => {
            if (r.status === 401) {
              return r.json().then((data) => {
                if (isAuthTokenError(data)) {
                  logout()
                  return null
                }

                return { ok: false, data }
              })
            }

            return r.json().then((data) => ({ ok: r.ok, data }))
          })
          .then((result) => {
            if (!result) {
              return
            }

            if (!result.ok) {
              alert(result.data.error || 'Falha ao atualizar PA')
              return
            }

            alert('Atualizado')
          })
      }
    </script>
  </body>
</html>
