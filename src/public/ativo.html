<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalhes do Ativo</title>
    <link rel="stylesheet" href="/auth.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h3>Detalhes do Ativo</h3>
        <a href="/scanner.html">Voltar ao scanner</a>
      </div>

      <div class="grid" style="grid-template-columns: minmax(0, 480px)">
        <section class="card">
          <h2>Ativo</h2>

          <div class="item" id="empresa"></div>
          <div class="item" id="marca"></div>
          <div class="item" id="status"></div>
          <div class="item" id="local"></div>
          <div class="item" id="pa"></div>

          <label for="novaPA">Nova PA</label>
          <input id="novaPA" placeholder="Nova PA" />

          <button onclick="mover()">Atualizar PA</button>
        </section>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(location.search)
      const asset = params.get('id')

      fetch('/asset/' + asset)
        .then((r) => r.json())
        .then((data) => {
          document.getElementById('empresa').innerHTML = '<b>Empresa:</b> ' + data.empresa
          document.getElementById('marca').innerHTML = '<b>Marca:</b> ' + data.marca
          document.getElementById('status').innerHTML = '<b>Situação:</b> ' + data.status
          document.getElementById('local').innerHTML = '<b>Local:</b> ' + data.local
          document.getElementById('pa').innerHTML = '<b>PA:</b> ' + data.pa
        })

      function mover() {
        const pa = document.getElementById('novaPA').value

        fetch('/move', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            asset,
            pa
          })
        }).then(() => {
          alert('Atualizado')
        })
      }
    </script>
  </body>
</html>
