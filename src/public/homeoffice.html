<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Kit Home Office</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.card{

background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;

}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{

width:100%;
padding:12px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;

}

</style>

</head>

<body>

<div class="card">

<h2>Entrega Kit Home Office</h2>

<input id="usuario" placeholder="ID do usuário">

<input id="mouse" placeholder="ID Mouse">

<input id="teclado" placeholder="ID Teclado">

<input id="headset" placeholder="ID Headset">

<button onclick="entregar()">Entregar Kit</button>

</div>

<script>

function checkout(asset,user){

return fetch("/checkout",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
asset:asset,
user:user
})
})

}

async function entregar(){

let user = document.getElementById("usuario").value

await checkout(
document.getElementById("mouse").value,
user
)

await checkout(
document.getElementById("teclado").value,
user
)

await checkout(
document.getElementById("headset").value,
user
)

alert("Kit entregue")

}

</script>

</body>
</html>
