<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kit Home Office</title>
    <link rel="stylesheet" href="/auth.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h3>Entrega Kit Home Office</h3>
        <a href="/scanner.html">Voltar ao scanner</a>
      </div>

      <div class="grid" style="grid-template-columns: minmax(0, 480px)">
        <section class="card">
          <label for="usuario">ID do usuário</label>
          <input id="usuario" placeholder="ID do usuário" />

          <label for="mouse">ID Mouse</label>
          <input id="mouse" placeholder="ID Mouse" />

          <label for="teclado">ID Teclado</label>
          <input id="teclado" placeholder="ID Teclado" />

          <label for="headset">ID Headset</label>
          <input id="headset" placeholder="ID Headset" />

          <button onclick="entregar()">Entregar Kit</button>
        </section>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
      requireAuthToken()

      const authHeaders = (extra = {}) => ({
        ...extra,
        Authorization: `Bearer ${getJwtToken()}`
      })

      const logout = () => {
        clearJwtToken()
        window.location.href = '/login.html'
      }

      async function checkout(asset, user) {
        const response = await fetch('/checkout', {
          method: 'POST',
          headers: authHeaders({
            'Content-Type': 'application/json'
          }),
          body: JSON.stringify({
            asset,
            user
          })
        })

        if (response.status === 401) {
          logout()
          return
        }

        const data = await response.json()

        if (!response.ok) {
          throw new Error(data.error || 'Falha no checkout')
        }
      }

      async function entregar() {
        const user = document.getElementById('usuario').value

        try {
          await checkout(document.getElementById('mouse').value, user)
          await checkout(document.getElementById('teclado').value, user)
          await checkout(document.getElementById('headset').value, user)

          alert('Kit entregue')
        } catch (error) {
          alert(error.message)
        }
      }
    </script>
  </body>
</html>
