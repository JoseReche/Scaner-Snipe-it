<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alterar Senha</title>
    <link rel="stylesheet" href="/auth.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h3>Scaner Snipe-IT</h3>
        <a href="/dashboard.html">Voltar ao dashboard</a>
      </div>

      <div class="grid" style="grid-template-columns: minmax(0, 640px)">
        <section class="card">
          <h1>Alteração de Senha</h1>
          <p class="small">A nova senha deve conter no mínimo 12 caracteres, com maiúscula, minúscula, número e símbolo.</p>

          <form id="change-password-form">
            <label for="currentPassword">Senha Atual</label>
            <input id="currentPassword" name="currentPassword" type="password" required />

            <label for="newPassword">Nova Senha</label>
            <input id="newPassword" name="newPassword" type="password" required />

            <div class="actions">
              <button type="submit" class="success">Alterar senha</button>
            </div>
          </form>

          <p id="message" class="message" aria-live="polite"></p>
        </section>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
      setupChangePasswordForm('change-password-form', 'message')
    </script>
  </body>
</html>
