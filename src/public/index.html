<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Scanner de Ativos</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f5f9;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

#reader{
width:100%;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button.secondary{
background:#64748b;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

.status{
margin-top:10px;
font-size:14px;
}

.success{
color:#16a34a;
}

.error{
color:#dc2626;
}

.controls{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #cbd5e1;
width:100%;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Scanner de Ativos</h2>

<div class="card">

<div id="reader"></div>

<div class="controls">
<button onclick="startScanner()">Iniciar Scanner</button>
<button onclick="stopScanner()" class="secondary">Parar</button>
<button onclick="toggleFlash()" class="secondary">Lanterna</button>
</div>

<div class="status" id="scanStatus">
Aguardando leitura...
</div>

<input id="manualInput" placeholder="Digite ou cole o ID / URL do ativo">

<button onclick="buscarManual()">Buscar ativo</button>

</div>

</div>

<script>

let scanner
let cameraId = null
let flashEnabled = false

function parseAssetId(raw){

if(!raw) return null

raw = raw.trim()

if(raw.includes("hardware/")){
return raw.split("hardware/")[1]
}

return raw
}

function setStatus(text,type){

const el=document.getElementById("scanStatus")

el.textContent=text
el.className="status "+(type||"")

}

async function startScanner(){

try{

const devices = await Html5Qrcode.getCameras()

if(!devices.length){
setStatus("Nenhuma câmera encontrada","error")
return
}

cameraId = devices[devices.length-1].id

scanner = new Html5Qrcode("reader")

await scanner.start(
cameraId,
{
fps:12,
qrbox:{width:260,height:260},
aspectRatio:1.0
},
onScanSuccess
)

setStatus("Scanner ativo","success")

}catch(e){

setStatus("Erro ao iniciar câmera","error")
console.error(e)

}

}

async function stopScanner(){

if(scanner){

await scanner.stop()
scanner.clear()

setStatus("Scanner parado")

}

}

async function toggleFlash(){

if(!scanner) return

try{

flashEnabled=!flashEnabled

await scanner.applyVideoConstraints({
advanced:[{torch:flashEnabled}]
})

}catch(e){

alert("Lanterna não suportada neste dispositivo")

}

}

function vibrate(){

if(navigator.vibrate){
navigator.vibrate(120)
}

}

async function onScanSuccess(decodedText){

try{

await scanner.pause()

vibrate()

const id=parseAssetId(decodedText)

setStatus("Ativo detectado: "+id,"success")

console.log("QR:",decodedText)

buscarAtivo(id)

}catch(e){

console.error(e)

}

}

async function buscarManual(){

const value=document.getElementById("manualInput").value

const id=parseAssetId(value)

buscarAtivo(id)

}

async function buscarAtivo(id){

if(!id){
alert("ID inválido")
return
}

try{

setStatus("Buscando ativo...")

const res=await fetch("/asset/"+encodeURIComponent(id))

const data=await res.json()

if(!res.ok){
throw new Error(data.error || "Erro ao buscar")
}

setStatus("Ativo carregado: "+data.name,"success")

console.log("Asset:",data)

alert("Ativo: "+data.name)

}catch(e){

setStatus(e.message,"error")

}

}

startScanner()

</script>

</body>
</html>
